<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/login.css">
    <link rel="stylesheet" href="estilo/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    <main>
        <section>
           <main>
        <section id="login"> 
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>

                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>

                <form action="login.py" method="post" autocomplete="on">

                    <div class="campo">
                        <i class="material-icons">person</i>
                        <input type="email" id="iemail" name="email" placeholder="Seu e-mail" required autocomplete="email" maxlength="30">
                        <label for="iemail">Email</label>
                    </div>

                    <div class="campo">
                       <i class="material-icons">vpn_key</i>
                        <input type="password" id="isenha" name="senha" placeholder="Sua senha" required min="8" max="16" autocomplete="current-password">
                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar" id="botao-enviar">

                    <a href="esqueci.html" class="botao">Cadastre-se
                        <i class="material-icons">add_box</i>
                    </a>

                </form>
            </div>
        </section>             
        </section>
    </main>
</body>
</html>
